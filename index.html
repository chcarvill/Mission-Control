<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2126;
    --border: #2a2d34;
    --border2: #353940;
    --text: #e8eaed;
    --text-secondary: #8b909a;
    --text-hint: #555b66;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 10px;
    --radius-sm: 6px;

    --active:     #2bce8c;
    --active-bg:  #0d2e20;
    --hold:       #f59e0b;
    --hold-bg:    #2a1f08;
    --planning:   #60a5fa;
    --planning-bg:#0d1e35;
    --completed:  #6b7280;
    --completed-bg:#1a1c20;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  .header {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 0.5px solid var(--border);
    display: flex; align-items: flex-end; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
  }
  .header-left h1 {
    font-family: var(--mono);
    font-size: 20px; font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text);
  }
  .header-left .subtitle {
    font-size: 12px; color: var(--text-hint);
    font-family: var(--mono); margin-top: 3px;
    letter-spacing: 0.05em;
  }
  .header-stats {
    display: flex; gap: 24px; align-items: center;
  }
  .stat {
    text-align: right;
  }
  .stat-val {
    font-family: var(--mono); font-size: 18px;
    font-weight: 500; color: var(--text);
  }
  .stat-label {
    font-size: 11px; color: var(--text-hint);
    letter-spacing: 0.04em; text-transform: uppercase;
  }

  /* Priority panel */
  .priority-panel {
    background: #ffffff;
    border-bottom: 1px solid #e0e0e0;
    padding: 1rem 2.5rem 1.25rem;
  }
  .priority-title {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: #555; margin-bottom: 0.75rem; display: block;
  }
  .priority-count {
    font-family: var(--mono); font-size: 10px;
    color: var(--active); background: var(--active-bg);
    padding: 1px 7px; border-radius: 20px;
    margin-left: 8px;
  }
  .priority-list-wrap {
    display: block;
  }
  .priority-list {
    display: flex; flex-direction: column; gap: 4px;
    list-style: none;
  }
  .priority-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border-radius: var(--radius-sm);
    background: #f5f5f5; border: 0.5px solid #ddd;
    cursor: grab; transition: border-color 0.15s, background 0.15s;
    animation: fadeIn 0.2s ease both;
  }
  .priority-item:active { cursor: grabbing; }
  .priority-item.drag-over { border-color: var(--active); background: #e6faf3; }
  .priority-item.dragging { opacity: 0.4; }
  .priority-rank {
    font-family: var(--mono); font-size: 10px;
    color: var(--active); min-width: 18px; text-align: center;
    flex-shrink: 0;
  }
  .priority-text {
    flex: 1; font-size: 12px; color: #111;
    font-family: var(--sans); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .priority-venture-tag {
    font-family: var(--mono); font-size: 9px;
    color: #888; letter-spacing: 0.04em;
    flex-shrink: 0; white-space: nowrap;
  }
  .priority-move-btns {
    display: flex; flex-direction: column; gap: 1px; flex-shrink: 0;
  }
  .priority-move-btn {
    background: none; border: none; cursor: pointer;
    color: #aaa; font-size: 8px; line-height: 1;
    padding: 1px 3px; border-radius: 2px;
    transition: color 0.15s;
  }
  .priority-move-btn:hover { color: var(--active); }
  .priority-empty {
    font-family: var(--mono); font-size: 11px;
    color: #aaa; padding: 0.5rem 0;
    letter-spacing: 0.04em;
  }

  /* Filter bar */
  .filter-bar {
    padding: 1rem 2.5rem;
    display: flex; gap: 6px; align-items: center;
    border-bottom: 0.5px solid var(--border);
  }
  .filter-btn {
    font-family: var(--mono); font-size: 11px;
    padding: 5px 12px; border-radius: 20px;
    border: 0.5px solid var(--border2);
    background: transparent; color: var(--text-secondary);
    cursor: pointer; letter-spacing: 0.04em;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--text-hint); color: var(--text); }
  .filter-btn.active { background: var(--surface2); color: var(--text); border-color: var(--border2); }
  .add-btn {
    margin-left: auto;
    font-family: var(--mono); font-size: 11px;
    padding: 5px 14px; border-radius: 20px;
    border: 0.5px solid var(--border2);
    background: transparent; color: var(--active);
    border-color: var(--active);
    cursor: pointer; letter-spacing: 0.04em;
    transition: all 0.15s;
  }
  .add-btn:hover { background: var(--active-bg); }

  /* Grid */
  .ventures-grid {
    padding: 1.5rem 2.5rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1rem;
  }

  /* Venture card */
  .venture-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    display: flex; flex-direction: column; gap: 12px;
    transition: border-color 0.15s, transform 0.15s;
    animation: fadeIn 0.3s ease both;
  }
  .venture-card:hover { border-color: var(--border2); transform: translateY(-1px); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .card-top {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
  }
  .card-name {
    font-size: 15px; font-weight: 500; color: var(--text);
    flex: 1; outline: none; background: transparent;
    border: none; font-family: var(--sans);
    cursor: text;
  }
  .card-name:focus { color: var(--text); }

  .status-pill {
    font-family: var(--mono); font-size: 10px;
    padding: 3px 9px; border-radius: 20px;
    font-weight: 500; letter-spacing: 0.04em;
    cursor: pointer; flex-shrink: 0;
    border: none; outline: none;
    transition: opacity 0.15s;
  }
  .status-pill:hover { opacity: 0.8; }
  .status-active    { background: var(--active-bg);    color: var(--active); }
  .status-on-hold   { background: var(--hold-bg);      color: var(--hold); }
  .status-planning  { background: var(--planning-bg);  color: var(--planning); }
  .status-completed { background: var(--completed-bg); color: var(--completed); }

  /* Key next action */
  .next-action-label {
    font-family: var(--mono); font-size: 10px;
    color: var(--text-hint); letter-spacing: 0.06em;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .next-action-input {
    width: 100%; background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px; font-size: 13px;
    font-family: var(--sans); color: var(--text);
    outline: none; resize: none;
    transition: border-color 0.15s;
    min-height: 36px;
  }
  .next-action-input:focus { border-color: var(--active); }
  .next-action-input::placeholder { color: var(--text-hint); }

  /* Mini tasks */
  .tasks-section { display: flex; flex-direction: column; gap: 6px; }
  .tasks-header {
    display: flex; align-items: center; justify-content: space-between;
  }
  .tasks-label {
    font-family: var(--mono); font-size: 10px;
    color: var(--text-hint); letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .tasks-count {
    font-family: var(--mono); font-size: 10px;
    color: var(--text-hint);
  }

  .task-item {
    display: flex; align-items: center; gap: 8px;
  }
  .task-cb {
    width: 14px; height: 14px; border-radius: 50%;
    border: 1px solid var(--border2);
    background: transparent; cursor: pointer;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 8px; color: var(--active);
    transition: all 0.15s; padding: 0;
  }
  .task-cb.done { background: var(--active-bg); border-color: var(--active); }
  .task-text {
    flex: 1; font-size: 12px; color: var(--text-secondary);
    background: transparent; border: none; outline: none;
    font-family: var(--sans);
  }
  .task-text.done { text-decoration: line-through; color: var(--text-hint); }
  .task-del {
    width: 16px; height: 16px; border-radius: 50%;
    border: none; background: transparent;
    color: var(--text-hint); cursor: pointer;
    font-size: 10px; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
    padding: 0;
  }
  .task-item:hover .task-del { opacity: 1; }
  .task-del:hover { color: #ef4444; }

  .add-task-row {
    display: flex; gap: 6px; align-items: center; margin-top: 2px;
  }
  .add-task-input {
    flex: 1; background: transparent; border: none;
    border-bottom: 0.5px solid var(--border);
    font-size: 12px; font-family: var(--sans);
    color: var(--text-secondary); outline: none; padding: 3px 0;
  }
  .add-task-input::placeholder { color: var(--text-hint); }
  .add-task-input:focus { border-color: var(--border2); }
  .add-task-btn {
    font-size: 16px; color: var(--text-hint);
    background: none; border: none; cursor: pointer;
    line-height: 1; padding: 0 2px;
    transition: color 0.15s;
  }
  .add-task-btn:hover { color: var(--active); }

  /* Card footer */
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 8px; border-top: 0.5px solid var(--border);
  }
  .card-notes-toggle {
    font-family: var(--mono); font-size: 10px;
    color: var(--text-hint); cursor: pointer;
    background: none; border: none; letter-spacing: 0.04em;
    transition: color 0.15s; padding: 0;
  }
  .card-notes-toggle:hover { color: var(--text-secondary); }
  .card-delete {
    font-family: var(--mono); font-size: 10px;
    color: var(--text-hint); cursor: pointer;
    background: none; border: none;
    transition: color 0.15s; padding: 0;
  }
  .card-delete:hover { color: #ef4444; }

  /* Details area */
  .details-area {
    display: none; flex-direction: column; gap: 6px;
    background: var(--surface2); border-radius: var(--radius-sm);
    padding: 10px 12px; border: 0.5px solid var(--border);
  }
  .details-area.visible { display: flex; }
  .detail-row {
    display: flex; gap: 8px; font-size: 12px;
  }
  .detail-label {
    font-family: var(--mono); font-size: 10px;
    color: var(--text-hint); letter-spacing: 0.04em;
    text-transform: uppercase; min-width: 80px; flex-shrink: 0;
    padding-top: 1px;
  }
  .detail-val {
    color: var(--text-secondary); font-family: var(--sans);
    flex: 1;
  }
  .always-active {
    color: var(--active) !important;
  }

  /* Notes area inside details */
  .notes-area {
    width: 100%; background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px; font-size: 12px;
    font-family: var(--sans); color: var(--text-secondary);
    outline: none; resize: vertical; min-height: 60px;
    transition: border-color 0.15s; display: none;
  }
  .notes-area:focus { border-color: var(--border2); }
  .notes-area::placeholder { color: var(--text-hint); }
  .notes-area.visible { display: block; }

  /* Add venture modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center;
    z-index: 200; backdrop-filter: blur(4px);
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 1.75rem; width: 100%; max-width: 420px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .modal h2 {
    font-family: var(--mono); font-size: 13px;
    letter-spacing: 0.06em; color: var(--text);
  }
  .modal-input {
    width: 100%; background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px; font-size: 14px;
    font-family: var(--sans); color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .modal-input:focus { border-color: var(--border2); }
  .modal-input::placeholder { color: var(--text-hint); }
  .modal-status-row {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .modal-status-btn {
    font-family: var(--mono); font-size: 10px;
    padding: 5px 12px; border-radius: 20px;
    border: 0.5px solid var(--border2);
    background: transparent; color: var(--text-secondary);
    cursor: pointer; letter-spacing: 0.04em;
    transition: all 0.15s;
  }
  .modal-status-btn.sel-active    { background: var(--active-bg);    color: var(--active);    border-color: var(--active); }
  .modal-status-btn.sel-on-hold   { background: var(--hold-bg);      color: var(--hold);      border-color: var(--hold); }
  .modal-status-btn.sel-planning  { background: var(--planning-bg);  color: var(--planning);  border-color: var(--planning); }
  .modal-status-btn.sel-completed { background: var(--completed-bg); color: var(--completed); border-color: var(--completed); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-cancel {
    font-family: var(--mono); font-size: 11px;
    padding: 7px 16px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: transparent; color: var(--text-secondary);
    cursor: pointer;
  }
  .modal-confirm {
    font-family: var(--mono); font-size: 11px;
    padding: 7px 16px; border-radius: var(--radius-sm);
    border: none; background: var(--active);
    color: #000; cursor: pointer; font-weight: 500;
    transition: opacity 0.15s;
  }
  .modal-confirm:hover { opacity: 0.85; }

  .empty-state {
    grid-column: 1/-1;
    text-align: center; padding: 4rem 2rem;
    color: var(--text-hint); font-family: var(--mono);
    font-size: 13px; letter-spacing: 0.05em;
  }

  /* Venture colour strip */
  .venture-card { border-left: 3px solid transparent; }

  /* Due date */
  .due-date-row {
    display: flex; align-items: center; gap: 6px;
  }
  .due-date-label {
    font-family: var(--mono); font-size: 10px;
    color: var(--text-hint); letter-spacing: 0.06em;
    text-transform: uppercase; flex-shrink: 0;
  }
  .due-date-input {
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: var(--radius-sm); padding: 4px 8px;
    font-size: 12px; font-family: var(--mono); color: var(--text);
    outline: none; transition: border-color 0.15s;
    color-scheme: dark;
  }
  .due-date-input:focus { border-color: var(--active); }
  .due-badge {
    font-family: var(--mono); font-size: 10px;
    padding: 2px 8px; border-radius: 20px; font-weight: 500;
    flex-shrink: 0;
  }
  .due-badge.overdue  { background: #3b0a0a; color: #f87171; }
  .due-badge.due-soon { background: #2d1a00; color: #fbbf24; }

  /* Archive items (inside modal) */
  .archive-list {
    display: flex; flex-direction: column; gap: 4px;
    list-style: none;
  }
  .archive-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border-radius: var(--radius-sm);
    background: #f5f5f5; border: 0.5px solid #ddd;
    animation: fadeIn 0.2s ease both;
  }
  .archive-check {
    font-size: 11px; color: #aaa; flex-shrink: 0;
  }
  .archive-text {
    flex: 1; font-size: 12px; color: #666;
    font-family: var(--sans); text-decoration: line-through;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .archive-venture-tag {
    font-family: var(--mono); font-size: 9px;
    color: #aaa; letter-spacing: 0.04em; flex-shrink: 0;
  }
  .archive-date {
    font-family: var(--mono); font-size: 9px;
    color: #bbb; flex-shrink: 0;
  }
  .archive-restore {
    background: none; border: none; cursor: pointer;
    font-family: var(--mono); font-size: 9px;
    color: #aaa; padding: 2px 6px; border-radius: 4px;
    transition: color 0.15s; flex-shrink: 0;
  }
  .archive-restore:hover { color: var(--active); }
  .archive-empty {
    font-family: var(--mono); font-size: 11px;
    color: #aaa; padding: 0.5rem 0; letter-spacing: 0.04em;
  }

  @media (max-width: 600px) {
    .header { padding: 1.25rem; flex-direction: column; align-items: flex-start; gap: 12px; }
    .ventures-grid { padding: 1rem; }
    .filter-bar { padding: 0.75rem 1rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>MISSION CONTROL</h1>
    <div class="subtitle" id="header-date"></div>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-val" id="stat-active">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
  </div>
</div>

<!-- Priority panel -->
<div class="priority-panel" id="priority-panel">
  <span class="priority-title">Priority Actions <span class="priority-count" id="priority-count">0</span></span>
  <div class="priority-list-wrap" id="priority-list-wrap">
    <ul class="priority-list" id="priority-list"></ul>
  </div>
</div>


<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
  <button class="filter-btn" onclick="setFilter('on-hold', this)">On hold</button>
  <button class="filter-btn" onclick="setFilter('planning', this)">In planning</button>
  <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
  <div style="margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
    <button class="add-btn" onclick="openModal()">+ New mission</button>
    <button class="add-btn" onclick="openArchive()" style="color:var(--text-secondary);border-color:var(--border2);font-size:10px;padding:4px 14px;">✓ Completed missions <span id="archive-count-btn" style="margin-left:4px;background:var(--surface2);padding:1px 6px;border-radius:10px;">0</span></button>
  </div>
</div>

<div class="ventures-grid" id="ventures-grid"></div>

<!-- Archive modal -->
<div class="modal-overlay" id="archive-modal">
  <div class="modal" style="max-width:560px;max-height:80vh;overflow-y:auto;">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <h2>COMPLETED MISSIONS</h2>
      <button class="modal-cancel" onclick="closeArchive()" style="padding:4px 10px;">✕</button>
    </div>
    <ul class="archive-list" id="archive-list" style="margin-top:4px;"></ul>
  </div>
</div>

<!-- Add venture modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>NEW MISSION</h2>
    <input class="modal-input" id="modal-venture" placeholder="Part of which business venture?" />
    <input class="modal-input" id="modal-department" placeholder="Department within this business venture?" />
    <input class="modal-input" id="modal-description" placeholder="In a few words, describe this arm of your business." />
    <input class="modal-input" id="modal-next" placeholder="In a few words, what do you need to get done?" />
    <input class="modal-input" id="modal-name" placeholder="Please name the specific action." />
    <div style="display:flex;align-items:center;gap:10px;margin-top:2px;">
      <label style="font-family:var(--mono);font-size:11px;color:var(--text-hint);letter-spacing:0.04em;">Due date</label>
      <input type="date" class="modal-input due-date-input" id="modal-due" style="width:auto;flex:1;" />
    </div>
    <div class="modal-status-row" id="modal-status-row">
      <button class="modal-status-btn sel-active" data-status="active" onclick="selectModalStatus(this)">Active</button>
      <button class="modal-status-btn" data-status="on-hold" onclick="selectModalStatus(this)">On hold</button>
      <button class="modal-status-btn" data-status="planning" onclick="selectModalStatus(this)">In planning</button>
      <button class="modal-status-btn" data-status="completed" onclick="selectModalStatus(this)">Completed</button>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmAddVenture()">Add mission</button>
    </div>
  </div>
</div>

<script>
// ── State ──
function load() {
  return JSON.parse(localStorage.getItem('mc_ventures') || '[]');
}
function save(data) {
  localStorage.setItem('mc_ventures', JSON.stringify(data));
}

let currentFilter = 'all';
let modalStatus = 'active';

// ── Header date ──
document.getElementById('header-date').textContent =
  new Date().toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }).toLowerCase();

// ── Stats ──
function updateStats() {
  const ventures = load();
  document.getElementById('stat-total').textContent = ventures.length;
  document.getElementById('stat-active').textContent = ventures.filter(v => v.status === 'active').length;
}

// ── Filter ──
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── Modal ──
function openModal() {
  document.getElementById('modal-venture').value = '';
  document.getElementById('modal-department').value = '';
  document.getElementById('modal-description').value = '';
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-next').value = '';
  document.getElementById('modal-due').value = '';
  selectModalStatus(document.querySelector('[data-status="active"]'));
  document.getElementById('modal').classList.add('visible');
  setTimeout(() => document.getElementById('modal-venture').focus(), 50);
}
function closeModal() {
  document.getElementById('modal').classList.remove('visible');
}
function selectModalStatus(btn) {
  modalStatus = btn.dataset.status;
  document.querySelectorAll('.modal-status-btn').forEach(b => {
    b.className = 'modal-status-btn';
  });
  btn.classList.add('sel-' + modalStatus);
}
function confirmAddVenture() {
  const name = document.getElementById('modal-name').value.trim();
  if (!name) { document.getElementById('modal-name').focus(); return; }
  const ventures = load();
  const ventureLabel = document.getElementById('modal-venture').value.trim();
  ventures.push({
    id: Date.now(),
    name,
    venture: ventureLabel,
    department: document.getElementById('modal-department').value.trim(),
    description: document.getElementById('modal-description').value.trim(),
    status: modalStatus,
    nextAction: document.getElementById('modal-next').value.trim(),
    dueDate: document.getElementById('modal-due').value,
    color: getVentureColor(ventureLabel),
    tasks: [],
    notes: '',
    notesVisible: false,
    detailsVisible: false
  });
  save(ventures);
  closeModal();
  render();
  renderPriority();
  renderArchive();
}

// ── Status cycle ──
const statusCycle = ['active', 'on-hold', 'planning', 'completed'];
const statusLabels = { 'active': 'Active', 'on-hold': 'On hold', 'planning': 'In planning', 'completed': 'Completed' };
function cycleStatus(id) {
  const ventures = load();
  const v = ventures.find(x => x.id === id);
  if (!v) return;
  const idx = statusCycle.indexOf(v.status);
  v.status = statusCycle[(idx + 1) % statusCycle.length];
  save(ventures);
  render();
}

// ── Update fields ──
function updateName(id, val) {
  const ventures = load(); const v = ventures.find(x => x.id === id);
  if (v) { v.name = val; save(ventures); updateStats(); }
}
function updateNextAction(id, val) {
  const ventures = load(); const v = ventures.find(x => x.id === id);
  if (v) { v.nextAction = val; save(ventures); }
}
function updateDueDate(id, val) {
  const ventures = load(); const v = ventures.find(x => x.id === id);
  if (v) { v.dueDate = val; save(ventures); render(); renderPriority(); }
}
function updateNotes(id, val) {
  const ventures = load(); const v = ventures.find(x => x.id === id);
  if (v) { v.notes = val; save(ventures); }
}

// ── Tasks ──
function addTask(id, inputEl) {
  const text = inputEl.value.trim();
  if (!text) return;
  const ventures = load(); const v = ventures.find(x => x.id === id);
  if (v) {
    v.tasks.push({ id: Date.now(), text, done: false });
    save(ventures);
    render();
  }
}
function toggleTask(vid, tid) {
  const ventures = load(); const v = ventures.find(x => x.id === vid);
  if (v) {
    const t = v.tasks.find(t => t.id === tid);
    if (t) t.done = !t.done;
    save(ventures); render();
  }
}
function deleteTask(vid, tid) {
  const ventures = load(); const v = ventures.find(x => x.id === vid);
  if (v) { v.tasks = v.tasks.filter(t => t.id !== tid); save(ventures); render(); }
}
function updateTaskText(vid, tid, val) {
  const ventures = load(); const v = ventures.find(x => x.id === vid);
  if (v) { const t = v.tasks.find(t => t.id === tid); if (t) t.text = val; save(ventures); }
}

// ── Delete venture ──
function deleteVenture(id) {
  if (!confirm('Remove this venture?')) return;
  const ventures = load().filter(v => v.id !== id);
  save(ventures); render(); renderPriority();
}

let alwaysShowDetails = JSON.parse(localStorage.getItem('mc_always_details') || 'false');

function toggleAlwaysDetails() {
  alwaysShowDetails = !alwaysShowDetails;
  localStorage.setItem('mc_always_details', JSON.stringify(alwaysShowDetails));
  render();
}

// ── Toggle details ──
function toggleDetails(id) {
  const ventures = load(); const v = ventures.find(x => x.id === id);
  if (v) { v.detailsVisible = !v.detailsVisible; save(ventures); render(); }
}

// ── Render ──
function render() {
  const ventures = load();
  const grid = document.getElementById('ventures-grid');
  grid.innerHTML = '';

  const filtered = currentFilter === 'all' ? ventures : ventures.filter(v => v.status === currentFilter);

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">no ventures here yet.</div>';
    updateStats(); return;
  }

  filtered.forEach((v, idx) => {
    const card = document.createElement('div');
    card.className = 'venture-card';
    card.style.animationDelay = (idx * 0.04) + 's';
    // Venture colour strip — override border if due date is urgent
    const urgentColor = cardBorderColor(v.dueDate);
    const color = urgentColor || (v.color || getVentureColor(v.venture));
    card.style.borderLeftColor = color;
    card.style.borderLeftWidth = '3px';

    const doneTasks = v.tasks.filter(t => t.done).length;
    const totalTasks = v.tasks.length;

    card.innerHTML = `
      <div class="card-top">
        <input class="card-name" value="${esc(v.name)}" placeholder="Mission name..."
          onchange="updateName(${v.id}, this.value)" />
        <button class="status-pill status-${v.status}" onclick="cycleStatus(${v.id})">
          ${statusLabels[v.status]}
        </button>
      </div>

      ${v.venture ? `<div style="font-family:var(--mono);font-size:10px;color:var(--text-hint);letter-spacing:0.04em;">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${v.color || getVentureColor(v.venture)};margin-right:5px;vertical-align:middle;"></span>${esc(v.venture)}${v.department ? ' › ' + esc(v.department) : ''}
      </div>` : ''}

      <div class="due-date-row">
        <span class="due-date-label">due</span>
        <input type="date" class="due-date-input" value="${v.dueDate || ''}"
          onchange="updateDueDate(${v.id}, this.value)" />
        ${dueBadge(v.dueDate)}
      </div>

      <div>
        <div class="next-action-label">↳ Next Key Action</div>
        <textarea class="next-action-input" placeholder="What moves this forward today?"
          onchange="updateNextAction(${v.id}, this.value)"
          rows="2">${esc(v.nextAction)}</textarea>
      </div>

      <div class="tasks-section">
        <div class="tasks-header">
          <span class="tasks-label">Mini tasks</span>
          <span class="tasks-count">${doneTasks}/${totalTasks}</span>
        </div>
        ${v.tasks.map(t => `
          <div class="task-item">
            <button class="task-cb ${t.done ? 'done' : ''}" onclick="toggleTask(${v.id}, ${t.id})">${t.done ? '✓' : ''}</button>
            <input class="task-text ${t.done ? 'done' : ''}" value="${esc(t.text)}"
              onchange="updateTaskText(${v.id}, ${t.id}, this.value)" />
            <button class="task-del" onclick="deleteTask(${v.id}, ${t.id})">✕</button>
          </div>
        `).join('')}
        <div class="add-task-row">
          <input class="add-task-input" id="task-input-${v.id}" placeholder="Add task..."
            onkeydown="if(event.key==='Enter'){addTask(${v.id}, this);}" />
          <button class="add-task-btn" onclick="addTask(${v.id}, document.getElementById('task-input-${v.id}'))">+</button>
        </div>
      </div>

      <div class="details-area ${(v.detailsVisible || alwaysShowDetails) ? 'visible' : ''}">
        ${v.venture ? `<div class="detail-row"><span class="detail-label">Venture</span><span class="detail-val">${esc(v.venture)}</span></div>` : ''}
        ${v.department ? `<div class="detail-row"><span class="detail-label">Department</span><span class="detail-val">${esc(v.department)}</span></div>` : ''}
        ${v.description ? `<div class="detail-row"><span class="detail-label">Description</span><span class="detail-val">${esc(v.description)}</span></div>` : ''}
        ${v.nextAction ? `<div class="detail-row"><span class="detail-label">To get done</span><span class="detail-val">${esc(v.nextAction)}</span></div>` : ''}
        ${v.dueDate ? `<div class="detail-row"><span class="detail-label">Due</span><span class="detail-val">${new Date(v.dueDate + 'T00:00:00').toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'long',year:'numeric'})}</span></div>` : ''}
        <textarea class="notes-area visible" style="margin-top:6px;"
          placeholder="Notes..."
          onchange="updateNotes(${v.id}, this.value)">${esc(v.notes)}</textarea>
      </div>

      <div class="card-footer">
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="card-notes-toggle" onclick="toggleDetails(${v.id})">
            ${(v.detailsVisible || alwaysShowDetails) ? '− Details' : '+ Details'}
          </button>
          <button class="card-notes-toggle ${alwaysShowDetails ? 'always-active' : ''}" onclick="toggleAlwaysDetails()" title="Pin details open on all cards">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="${alwaysShowDetails ? '#2bce8c' : '#555b66'}" style="vertical-align:middle;margin-right:3px;"><path d="M16 3a1 1 0 0 1 .7 1.7L14 7.4l1.3 5.2-3.3 3.3V21l-1-1v-5.1L7.7 11.6l-1.4.3a1 1 0 0 1-.9-1.7l9-7a1 1 0 0 1 .6-.2z"/></svg>${alwaysShowDetails ? 'always on' : 'always show'}
          </button>
        </div>
        <div style="display:flex;gap:10px;align-items:center;">
          <button class="card-notes-toggle" onclick="archiveMission(${v.id})" style="color:var(--active);">✓ complete</button>
          <button class="card-delete" onclick="deleteVenture(${v.id})">remove</button>
        </div>
      </div>
    `;

    grid.appendChild(card);
  });

  updateStats();

  // Email this view button — appended after all cards
  const emailBar = document.createElement('div');
  emailBar.style.cssText = 'grid-column:1/-1;display:flex;justify-content:flex-end;padding:4px 0 12px;';
  emailBar.innerHTML = `<button onclick="emailCurrentView()" style="font-family:var(--mono);font-size:11px;padding:6px 16px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text-secondary);cursor:pointer;letter-spacing:0.04em;transition:all 0.15s;" onmouseover="this.style.color='var(--text)';this.style.borderColor='var(--text-hint)';" onmouseout="this.style.color='var(--text-secondary)';this.style.borderColor='var(--border2)';">✉ email this view</button>`;
  grid.appendChild(emailBar);
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Venture colours ──
const VENTURE_COLORS = [
  '#2bce8c','#60a5fa','#f59e0b','#f472b6','#a78bfa',
  '#34d399','#fb923c','#38bdf8','#e879f9','#facc15'
];
const ventureColorMap = JSON.parse(localStorage.getItem('mc_venture_colors') || '{}');
function saveVentureColors() { localStorage.setItem('mc_venture_colors', JSON.stringify(ventureColorMap)); }
function getVentureColor(label) {
  if (!label) return '#555b66';
  const key = label.trim().toLowerCase();
  if (!ventureColorMap[key]) {
    const used = Object.values(ventureColorMap);
    const next = VENTURE_COLORS.find(c => !used.includes(c)) || VENTURE_COLORS[Object.keys(ventureColorMap).length % VENTURE_COLORS.length];
    ventureColorMap[key] = next;
    saveVentureColors();
  }
  return ventureColorMap[key];
}

// ── Due date helpers ──
function dueBadge(dateStr) {
  if (!dateStr) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const due = new Date(dateStr + 'T00:00:00');
  const diff = Math.round((due - today) / 86400000);
  if (diff < 0)  return `<span class="due-badge overdue">overdue</span>`;
  if (diff <= 3) return `<span class="due-badge due-soon">due ${diff === 0 ? 'today' : `in ${diff}d`}</span>`;
  return `<span style="font-family:var(--mono);font-size:10px;color:var(--text-hint);">${due.toLocaleDateString('en-AU',{day:'numeric',month:'short'})}</span>`;
}
function cardBorderColor(dateStr) {
  if (!dateStr) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const due = new Date(dateStr + 'T00:00:00');
  const diff = Math.round((due - today) / 86400000);
  if (diff < 0)  return '#f87171';
  if (diff <= 3) return '#fbbf24';
  return '';
}

// ── Archive ──
function loadArchive() { return JSON.parse(localStorage.getItem('mc_archive') || '[]'); }
function saveArchive(arr) { localStorage.setItem('mc_archive', JSON.stringify(arr)); }

function archiveMission(id) {
  const ventures = load();
  const v = ventures.find(x => x.id === id);
  if (!v) return;
  const archive = loadArchive();
  archive.unshift({ id: v.id, name: v.name, venture: v.venture || '', archivedAt: new Date().toISOString().slice(0,10), color: v.color || '' });
  saveArchive(archive);
  const remaining = ventures.filter(x => x.id !== id);
  save(remaining);
  // Remove from priority too
  const priority = loadPriority().filter(p => p.id !== id);
  savePriority(priority);
  render(); renderPriority(); renderArchive();
}

function restoreFromArchive(id) {
  const archive = loadArchive();
  const item = archive.find(a => a.id === id);
  if (!item) return;
  const ventures = load();
  ventures.push({ id: item.id, name: item.name, venture: item.venture, department: '', description: '', status: 'active', nextAction: '', dueDate: '', color: item.color || getVentureColor(item.venture), tasks: [], notes: '', notesVisible: false });
  save(ventures);
  saveArchive(archive.filter(a => a.id !== id));
  render(); renderPriority(); renderArchive();
}

function openArchive() {
  renderArchive();
  document.getElementById('archive-modal').classList.add('visible');
}
function closeArchive() {
  document.getElementById('archive-modal').classList.remove('visible');
}

function renderArchive() {
  const archive = loadArchive();
  const list = document.getElementById('archive-list');
  const countBtn = document.getElementById('archive-count-btn');
  if (countBtn) countBtn.textContent = archive.length;
  list.innerHTML = '';
  if (archive.length === 0) {
    list.innerHTML = '<li class="archive-empty" style="color:var(--text-hint);">no completed missions yet.</li>';
    return;
  }
  archive.forEach(a => {
    const li = document.createElement('li');
    li.className = 'archive-item';
    li.innerHTML = `
      <span class="archive-check">✓</span>
      ${a.color ? `<span style="width:4px;height:20px;border-radius:2px;background:${a.color};flex-shrink:0;"></span>` : ''}
      <span class="archive-text">${esc(a.name)}</span>
      ${a.venture ? `<span class="archive-venture-tag">${esc(a.venture)}</span>` : ''}
      <span class="archive-date">${a.archivedAt}</span>
      <button class="archive-restore" onclick="restoreFromArchive(${a.id})" title="Restore">↩ restore</button>
    `;
    list.appendChild(li);
  });
}

// ── Priority panel ──
function loadPriority() {
  return JSON.parse(localStorage.getItem('mc_priority') || '[]');
}
function savePriority(arr) {
  localStorage.setItem('mc_priority', JSON.stringify(arr));
}

function syncPriorityFromVentures() {
  const ventures = load();
  let priority = loadPriority();
  ventures.forEach(v => {
    if (v.name && !priority.find(p => p.id === v.id)) {
      priority.push({ id: v.id, name: v.name, venture: v.venture || '', dueDate: v.dueDate || '', color: v.color || '' });
    }
  });
  priority = priority.filter(p => ventures.find(v => v.id === p.id));
  priority.forEach(p => {
    const v = ventures.find(v => v.id === p.id);
    if (v) { p.name = v.name; p.venture = v.venture || ''; p.dueDate = v.dueDate || ''; p.color = v.color || ''; }
  });
  savePriority(priority);
  return priority;
}

function movePriority(idx, dir) {
  const priority = loadPriority();
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= priority.length) return;
  [priority[idx], priority[newIdx]] = [priority[newIdx], priority[idx]];
  savePriority(priority);
  renderPriority();
}

let dragSrcIdx = null;

function renderPriority() {
  const priority = syncPriorityFromVentures();
  const list = document.getElementById('priority-list');
  const countEl = document.getElementById('priority-count');
  countEl.textContent = priority.length;

  list.innerHTML = '';
  if (priority.length === 0) {
    list.innerHTML = '<li class="priority-empty">no missions yet — add one above.</li>';
    return;
  }

  priority.forEach((p, idx) => {
    const li = document.createElement('li');
    li.className = 'priority-item';
    li.draggable = true;
    li.dataset.idx = idx;
    li.innerHTML = `
      <span class="priority-rank">${idx + 1}</span>
      ${p.color ? `<span style="width:6px;height:6px;border-radius:50%;background:${p.color};flex-shrink:0;"></span>` : ''}
      <span class="priority-text">${esc(p.name)}</span>
      ${p.venture ? `<span class="priority-venture-tag">${esc(p.venture)}</span>` : ''}
      ${p.dueDate ? dueBadge(p.dueDate) : ''}
      <div class="priority-move-btns">
        <button class="priority-move-btn" onclick="movePriority(${idx}, -1)" title="Move up" ${idx === 0 ? 'disabled style="opacity:0.2"' : ''}>▲</button>
        <button class="priority-move-btn" onclick="movePriority(${idx}, 1)" title="Move down" ${idx === priority.length - 1 ? 'disabled style="opacity:0.2"' : ''}>▼</button>
      </div>
    `;

    // Drag events
    li.addEventListener('dragstart', e => {
      dragSrcIdx = idx;
      li.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    li.addEventListener('dragend', () => {
      li.classList.remove('dragging');
      list.querySelectorAll('.priority-item').forEach(el => el.classList.remove('drag-over'));
    });
    li.addEventListener('dragover', e => {
      e.preventDefault();
      list.querySelectorAll('.priority-item').forEach(el => el.classList.remove('drag-over'));
      li.classList.add('drag-over');
    });
    li.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrcIdx === null || dragSrcIdx === idx) return;
      const arr = loadPriority();
      const [moved] = arr.splice(dragSrcIdx, 1);
      arr.splice(idx, 0, moved);
      savePriority(arr);
      dragSrcIdx = null;
      renderPriority();
    });

    list.appendChild(li);
  });
}

// ── Email current view ──
function emailCurrentView() {
  const ventures = load();
  const filtered = currentFilter === 'all' ? ventures : ventures.filter(v => v.status === currentFilter);

  const filterLabels = { 'all': 'All', 'active': 'Active', 'on-hold': 'On Hold', 'planning': 'In Planning', 'completed': 'Completed' };
  const viewLabel = filterLabels[currentFilter] || 'All';
  const dateStr = new Date().toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  if (!filtered.length) {
    alert('No missions to email in this view.');
    return;
  }

  const lines = [
    'MISSION CONTROL — ' + viewLabel.toUpperCase() + ' MISSIONS',
    '='.repeat(50),
    dateStr,
    '',
  ];

  filtered.forEach((v, i) => {
    lines.push((i + 1) + '. ' + (v.name || '(unnamed)'));
    if (v.venture)     lines.push('   Venture:     ' + v.venture + (v.department ? ' > ' + v.department : ''));
    if (v.description) lines.push('   Description: ' + v.description);
    lines.push('   Status:      ' + (statusLabels[v.status] || v.status));
    if (v.dueDate)     lines.push('   Due:         ' + new Date(v.dueDate + 'T00:00:00').toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' }));
    if (v.nextAction)  lines.push('   Next action: ' + v.nextAction);
    if (v.tasks && v.tasks.length) {
      lines.push('   Tasks:');
      v.tasks.forEach(t => lines.push('     [' + (t.done ? 'x' : ' ') + '] ' + t.text));
    }
    if (v.notes)       lines.push('   Notes:       ' + v.notes);
    lines.push('');
  });

  lines.push('-'.repeat(50));
  lines.push('Generated by Mission Control.');

  const subject = 'Mission Control — ' + viewLabel + ' Missions (' + new Date().toLocaleDateString('en-AU') + ')';
  const mailto = 'mailto:?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(lines.join('\n'));
  window.location.href = mailto;
}

// Close modals on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('archive-modal').addEventListener('click', function(e) {
  if (e.target === this) closeArchive();
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeArchive(); }
});

render();
renderPriority();
renderArchive();
</script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./mc-sw.js').catch(() => {});
}
let _prompt = null;
const _banner = document.getElementById('mc-install-banner');
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); _prompt = e;
  _banner.style.display = 'flex';
});
document.getElementById('mc-install-btn').addEventListener('click', async () => {
  if (!_prompt) return;
  _prompt.prompt();
  const { outcome } = await _prompt.userChoice;
  _prompt = null; _banner.style.display = 'none';
});
document.getElementById('mc-dismiss-btn').addEventListener('click', () => _banner.style.display = 'none');
window.addEventListener('appinstalled', () => _banner.style.display = 'none');
</script>
